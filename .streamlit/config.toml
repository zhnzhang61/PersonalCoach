[server]
# Bind localhost only as a safe default. The launchd LaunchAgent
# (~/Library/LaunchAgents/com.zhan.personalcoach-dashboard.plist) overrides
# this with the Tailscale IP so the dashboard is reachable only from the
# tailnet, never from whichever LAN the Mac happens to be on.
address = "127.0.0.1"
port = 8501
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
